<!DOCTYPE html>
    <html lang="en" dir="ltr">
      <head>
        <meta charset="utf-8">
        <title>Welcome!!</title>
      </head>
      <body style="background-color: LemonChiffon;">
        <h1> Browsing Human and Vertebrates genome</h1>
        <h2> BASIC Level Services</h2>

      <hr>
        <br>
        <form action="/listSpecies" method="get">
            <p1>1) List of species in the genome database</p1>
            <br><br>
            <label>Limit: </label>
            <input type="text" name="limit">
            <br> <br>
            <button type="submit">Send</button>
        </form>

      <br> <hr> <br>
      <form action="/karyotype" method="get">
          <p1> 2) Information about the karyotype: </p1>
          <br> <br>
          <label>Select the species: </label>
          <input type="text" name="species">
          <br><br>
          <button type="submit">Send</button>
      </form>

      <br> <hr> <br>
      <form action="/chromosomeLength" method="get">
          <p1> 3) Chromosome Length: </p1>
          <br> <br>
          <label>Select the species: </label>
          <input type="text" name="species_len">
          <br><br>
          <label>Select a chromosome: </label>
          <input type="text" name="chr">
          <br><br>
          <button type="submit">Send</button>
      </form>

      <br> <hr> <br>
      <form action="/geneLookup" method="get">
          <p1> 4) Gene's Stable Identifier </p1>
          <br> <br>
          <label>Select the gene (species is Homo Sapiens)</label>
          <input type="text" name="gene">
          <br><br>
          <button type="submit">Send</button>
      </form>

      <br> <hr> <br>
      <form action="/geneSeq" method="get">
          <p1> 5) Gene's Sequence </p1>
          <br> <br>
          <label>Select the gene (species is Homo Sapiens)</label>
          <input type="text" name="gene">
          <br><br>
          <button type="submit">Send</button>
      </form>

      <br> <hr> <br>
      <form action="/geneInfo" method="get">
          <p1> 6) Gene's General Information </p1>
          <br> <br>
          <label> Select the gene (species is Homo Sapiens)</label>
          <input type="text" name="gene">
          <br><br>
          <button type="submit">Send</button>
      </form>

      <br> <hr> <br>
      <form action="/geneCalc" method="get">
          <p1> 7) Gene's Calculations </p1>
          <br> <br>
          <label> Select the gene (species is Homo Sapiens)</label>
          <input type="text" name="gene">
          <br><br>
          <button type="submit">Send</button>
      </form>
      </body>
    </html>
